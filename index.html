<style>
@import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,500;8..60,600&family=Inter:wght@400;500;600&display=swap');
:root{--bg:#F7F4EE;--bubble-bot:#FFFFFF;--bubble-user:#D97757;--line:#E7E1D6;--text:#2B2520;--text-dim:#928C7F;--accent:#D97757;--accent-soft:#F1DDD2;--err:#B23B3B;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
body{background:var(--bg);font-family:'Inter',system-ui,sans-serif;color:var(--text);}
#pinScreen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;z-index:999;}
.pin-logo{width:56px;height:56px;border-radius:16px;background:var(--accent);display:flex;align-items:center;justify-content:center;}
.pin-dot-inner{width:18px;height:18px;border-radius:50%;background:var(--bg);}
.pin-title{font-family:'Source Serif 4',serif;font-size:22px;font-weight:600;}
.pin-dots{display:flex;gap:14px;}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--accent);background:transparent;transition:background .15s;}
.pin-dot.filled{background:var(--accent);}
.pin-pad{display:grid;grid-template-columns:repeat(3,72px);gap:12px;}
.pin-key{width:72px;height:72px;border-radius:50%;border:1px solid var(--line);background:#fff;font-size:20px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif;color:var(--text);transition:background .1s;}
.pin-key:active{background:var(--accent-soft);}
.pin-key.del{font-size:16px;color:var(--text-dim);}
.pin-error{color:var(--err);font-size:13px;height:18px;}
#app{display:none;flex-direction:column;height:100vh;max-width:600px;margin:0 auto;}
#app.visible{display:flex;}
.nexus-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--line);flex-shrink:0;}
.brand{display:flex;align-items:center;gap:10px;}
.mark{width:28px;height:28px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center;}
.mark-dot{width:9px;height:9px;border-radius:50%;background:var(--bg);}
.brand-name{font-family:'Source Serif 4',serif;font-weight:600;font-size:18px;}
.header-right{display:flex;align-items:center;gap:10px;}
.voice-state{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-dim);}
.vdot{width:6px;height:6px;border-radius:50%;background:#9AC18A;}
.vdot.off{background:var(--text-dim);}
.status-bar{display:flex;gap:8px;padding:6px 16px;background:#fff;border-bottom:1px solid var(--line);flex-shrink:0;flex-wrap:wrap;}
.status-pill{font-size:11px;padding:3px 10px;border-radius:999px;background:var(--accent-soft);color:var(--accent);font-weight:500;display:flex;align-items:center;gap:4px;cursor:pointer;}
.status-pill.off{background:#f0f0f0;color:var(--text-dim);}
.thread{flex:1;overflow-y:auto;padding:18px 16px 8px;display:flex;flex-direction:column;gap:14px;}
.row{display:flex;}
.row.user{justify-content:flex-end;}
.row.bot{justify-content:flex-start;}
.bubble{max-width:82%;padding:11px 14px;border-radius:16px;font-size:14.5px;line-height:1.5;}
.row.user .bubble{background:var(--bubble-user);color:#fff;border-bottom-right-radius:4px;}
.row.bot .bubble{background:var(--bubble-bot);border:1px solid var(--line);border-bottom-left-radius:4px;}
.tag{display:inline-block;margin-top:6px;font-size:11px;background:var(--accent-soft);color:var(--accent);padding:2px 8px;border-radius:999px;font-weight:500;}
.tag.err{background:#F4E1E1;color:var(--err);}
.tag.green{background:#e6f4e6;color:#2e7d32;}
.typing{display:flex;gap:4px;padding:4px 2px;}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--text-dim);animation:bounce 1s infinite ease-in-out;}
.typing span:nth-child(2){animation-delay:.15s;}
.typing span:nth-child(3){animation-delay:.3s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-4px);opacity:1}}
.empty-state{margin:auto 0;text-align:center;padding:0 24px;}
.empty-state h1{font-family:'Source Serif 4',serif;font-size:22px;font-weight:600;margin-bottom:6px;}
.empty-state p{color:var(--text-dim);font-size:14px;}
.suggestions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:18px;}
.sugg{background:#fff;border:1px solid var(--line);color:var(--text);font-size:13px;padding:8px 13px;border-radius:999px;cursor:pointer;font-family:'Inter',sans-serif;}
.sugg:active{border-color:var(--accent);}
.composer{display:flex;align-items:flex-end;gap:8px;padding:10px 12px;border-top:1px solid var(--line);background:var(--bg);flex-shrink:0;}
.mic-btn{width:42px;height:42px;border-radius:50%;flex-shrink:0;border:1px solid var(--line);background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;}
.mic-btn.listening{background:var(--accent);border-color:var(--accent);}
.mic-btn.listening::before{content:'';position:absolute;inset:-5px;border-radius:50%;border:2px solid var(--accent);opacity:.5;animation:pulse 1.2s infinite;}
@keyframes pulse{0%{transform:scale(.9);opacity:.6}100%{transform:scale(1.35);opacity:0}}
.input-wrap{flex:1;background:#fff;border:1px solid var(--line);border-radius:22px;padding:4px 6px 4px 16px;display:flex;align-items:center;gap:6px;}
.text-input{flex:1;border:none;outline:none;background:transparent;font-family:'Inter',sans-serif;font-size:14.5px;color:var(--text);padding:9px 0;}
.send-btn{width:34px;height:34px;border-radius:50%;border:none;background:var(--accent);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.send-btn:disabled{opacity:.35;}
.ai-body{font-size:14px;line-height:1.6;}
.ai-body p{margin:0 0 6px;}
.ai-body p:last-child{margin-bottom:0;}
.ai-body strong{font-weight:600;}
.ai-body ul,.ai-body ol{padding-left:18px;margin:4px 0 6px;}
.ai-body li{margin-bottom:2px;}
.ai-body code{font-family:monospace;font-size:12.5px;background:#F1EDE5;border:1px solid var(--line);padding:1px 5px;border-radius:4px;}
.ai-body pre{background:#F1EDE5;border:1px solid var(--line);border-radius:8px;padding:10px;margin:6px 0;overflow-x:auto;}
.ai-body pre code{background:none;border:none;}
.ai-body h3{font-family:'Source Serif 4',serif;font-size:15px;font-weight:600;margin:8px 0 3px;}
.yt-player{margin-top:8px;border-radius:10px;overflow:hidden;background:#000;aspect-ratio:16/9;width:100%;}
.yt-player iframe{width:100%;height:100%;border:none;display:block;}
.camera-preview{margin-top:8px;border-radius:10px;overflow:hidden;width:100%;max-height:260px;object-fit:cover;display:block;}
.map-frame{margin-top:8px;border-radius:10px;overflow:hidden;width:100%;height:220px;border:none;display:block;}
.action-btn{display:inline-block;margin-top:8px;margin-right:6px;padding:8px 14px;border-radius:999px;background:var(--accent);color:#fff;font-size:13px;font-weight:500;cursor:pointer;border:none;font-family:'Inter',sans-serif;}
.action-btn.ghost{background:transparent;color:var(--accent);border:1px solid var(--accent);}
</style>
</head>
<body>

    </button>
  </div>
</div>

<script>
const CORRECT_PIN = '123456';
const GEMINI_PROXY_URL = '/api/gemini'; // backend proxy holds the real key server-side

// ── PIN ──────────────────────────────────────────────────────────────────────
let pinEntry = '';
function pinPress(d){if(pinEntry.length>=6)return;pinEntry+=d;updateDots();if(pinEntry.length===6)setTimeout(pinSubmit,120);}
function pinDel(){pinEntry=pinEntry.slice(0,-1);updateDots();}
function updateDots(){for(let i=0;i<6;i++)document.getElementById('d'+i).classList.toggle('filled',i<pinEntry.length);}
function pinSubmit(){
  if(pinEntry===CORRECT_PIN){
    document.getElementById('pinScreen').style.display='none';
    document.getElementById('app').classList.add('visible');
    initVoice(); initBattery();
  }else{
    document.getElementById('pinError').textContent='Wrong pin, try again';
    pinEntry='';updateDots();
    setTimeout(()=>document.getElementById('pinError').textContent='',1800);
  }
}

// ── APPS ──────────────────────────────────────────────────────────────────────
const APPS = {
  spotify:   {a:['spotify'],          o:'https://open.spotify.com',          s:q=>'https://open.spotify.com/search/'+encodeURIComponent(q)},

function findApp(name){name=name.trim().toLowerCase();for(const k in APPS){if(APPS[k].a.includes(name))return APPS[k];}for(const k in APPS){if(APPS[k].a.some(a=>name.includes(a)))return APPS[k];}return null;}

// ── YOUTUBE ───────────────────────────────────────────────────────────────────
function extractYTVideoId(t){const m=t.match(/(?:youtube\.com\/(?:watch\?v=|shorts\/)|youtu\.be\/)([\w-]{11})/i);return m?m[1]:null;}
function extractYTURL(t){const m=t.match(/(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/shorts\/)[\w-]+(?:[?&][\w=&-]*)?/i);return m?(m[0].startsWith('http')?m[0]:'https://'+m[0]):null;}

// ── INTENT DETECTION ──────────────────────────────────────────────────────────
function detectIntent(raw){
  const text=raw.trim().replace(/[.?!]+$/,'');
  const low=text.toLowerCase();
  let m;

  // YouTube URL
  const ytUrl=extractYTURL(raw);
  if(ytUrl){const vid=extractYTVideoId(ytUrl);if(vid)return{type:'yt_play',videoId:vid};}

  // YouTube search
  if(/\b(?:download|watch|play)\b/.test(low)&&/youtube|youtu\.be|\byt\b/.test(low))
    return{type:'app_search',app:'youtube',query:low.replace(/\b(?:download|watch|play|on youtube|on yt)\b/g,'').trim()};

  // Phone
  if(m=low.match(/^call\s+(.+)$/))return{type:'call',target:m[1]};
  if(m=low.match(/^(?:text|message|sms)\s+(.+)$/))return{type:'sms',target:m[1]};

  // Email
  if(m=low.match(/^(?:email|mail)\s+(.+)$/))return{type:'email',target:m[1]};

  // Timer / Alarm
  if(m=low.match(/^set\s+(?:a\s+)?timer\s+(?:for\s+)?(.+)$/))return{type:'timer',duration:m[1]};
  if(m=low.match(/^(?:set\s+(?:an?\s+)?)?alarm\s+(?:for\s+|at\s+)?(.+)$/))return{type:'alarm',time:m[1]};

  // Location
  if(/\b(?:where am i|my location|my address|current location|find me|what'?s? my location)\b/.test(low))return{type:'location'};
  if(m=low.match(/^(?:navigate|directions?|take me|get me)\s+(?:to\s+)?(.+)$/))return{type:'navigate',dest:m[1]};
  if(m=low.match(/^(?:find|search|look\s*up)\s+(.+?)\s+(?:near(?:\s+me)?|nearby|close\s+by)$/))return{type:'nearby',query:m[1]};

  // Camera / Photo
  if(/\b(?:take\s+(?:a\s+)?photo|open\s+camera|camera|selfie|take\s+(?:a\s+)?picture|scan)\b/.test(low))return{type:'camera'};

  // Share
  if(/\b(?:share\s+(?:this|page|link)|share)\b/.test(low))return{type:'share'};

  // Clipboard
  if(m=low.match(/^copy\s+(?:this\s+)?["']?(.+?)["']?\s+to\s+clipboard$/))return{type:'copy',text:m[1]};
  if(m=low.match(/^copy\s+["']?(.+?)["']?$/))return{type:'copy',text:m[1]};

  // Vibrate
  if(/\b(?:vibrate|buzz)\b/.test(low))return{type:'vibrate'};

  // Battery
  if(/\b(?:battery|power\s+level|charge)\b/.test(low))return{type:'battery'};

  // Torch / Flashlight
  if(/\b(?:torch|flashlight|flash|light)\b/.test(low))return{type:'torch'};

  // Fullscreen
  if(/\b(?:full\s*screen|fullscreen)\b/.test(low))return{type:'fullscreen'};

  // Web search
  if(m=low.match(/^(?:search|google|look\s*up|find)\s+(.+?)(?:\s+on\s+(?:google|the\s+web|internet))?$/))
    return{type:'app_search',app:'google',query:m[1]};

  // Open app + search
  if(m=low.match(/^open\s+(?:the\s+)?([a-z0-9 ]+?)\s+and\s+(?:search(?:\s+for)?|play|look\s*up|find)\s+(.+)$/))return{type:'app_search',app:m[1],query:m[2]};
  if(m=low.match(/^(?:search(?:\s+for)?|play|look\s*up|find)\s+(.+?)\s+(?:on|in)\s+([a-z0-9 ]+)$/))return{type:'app_search',app:m[2],query:m[1]};
  if(m=low.match(/^open\s+(?:the\s+)?([a-z0-9 ]+)$/))return{type:'app_open',app:m[1]};

  return{type:'ai',question:text};
}

function setTimer(durationStr, rowId){
  // parse e.g. "5 minutes", "30 seconds", "1 hour"
  let ms=0;
  const h=durationStr.match(/(\d+)\s*h/i); if(h) ms+=parseInt(h[1])*3600000;
  const min=durationStr.match(/(\d+)\s*m/i); if(min) ms+=parseInt(min[1])*60000;
  const sec=durationStr.match(/(\d+)\s*s/i); if(sec) ms+=parseInt(sec[1])*1000;
  if(!ms){setRow(rowId,"Couldn't understand that duration. Try '5 minutes' or '30 seconds'.<span class='tag err'>Error</span>");return;}
  const label=durationStr.trim();
  setRow(rowId,'Timer set for <strong>'+esc(label)+'</strong>. I\'ll notify you when done!<span class="tag green">Timer</span>');
  setTimeout(()=>{
    if(Notification.permission==='granted'){new Notification('Nexus Timer','Timer for '+label+' is done!');}
    alert('Timer done: '+label);
    addRow('bot','Your <strong>'+esc(label)+'</strong> timer is up! <span class="tag green">Done</span>');
  },ms);
  // request notification permission
  if(Notification.permission==='default') Notification.requestPermission();
}

let torchOn=false, torchStream=null;
async function doTorch(rowId){
  try{
    if(torchOn){
      torchStream.getTracks().forEach(t=>t.stop());torchOn=false;torchStream=null;
      setRow(rowId,'Flashlight off. <span class="tag">Torch</span>');return;
    }
    torchStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    const track=torchStream.getVideoTracks()[0];
    await track.applyConstraints({advanced:[{torch:true}]});
    torchOn=true;
    setRow(rowId,'Flashlight on! Say "torch" again to turn off. <span class="tag green">Torch On</span>');
  }catch(e){setRow(rowId,'Flashlight not supported or permission denied.<span class="tag err">Unavailable</span>');}
}

// ── MARKDOWN ──────────────────────────────────────────────────────────────────
function mdToHtml(md){
  return md
    .replace(/```[\w]*\n?([\s\S]*?)```/g,'<pre><code>$1</code></pre>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/^#{2,3} (.+)$/gm,'<h3>$1</h3>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>[\s\S]+?<\/li>)/g,s=>'<ul>'+s+'</ul>')
    .split('\n\n').map(p=>p.startsWith('<')?p:'<p>'+p.trim()+'</p>').join('');
}
function esc(s){return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

const SYSTEM_PROMPT='You are Nexus, a smart personal AI assistant running on Android. Answer clearly and concisely. Use markdown: **bold** for key terms, bullet lists where helpful, numbered steps, code blocks where needed. For homework always show working. Remember everything the user has told you in this conversation. You can help with anything: questions, writing, coding, maths, advice, and more.';

async function handleAI(question,label,rowId){

    const data=await res.json();

    conversationHistory.push({role:'model',parts:[{text:text}]});

// ── RESPOND ───────────────────────────────────────────────────────────────────
async function respond(raw){
  if(!raw.trim())return;
  addRow('user',esc(raw));
  const tid=typingRow();
  const intent=detectIntent(raw);

  switch(intent.type){
    case 'yt_play':
      setTimeout(()=>setRow(tid,'<div class="yt-player"><iframe src="https://www.youtube.com/embed/'+intent.videoId+'?autoplay=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div><span class="tag">YouTube</span>'),400);
      break;
    case 'call':{
      const d=intent.target.replace(/\D/g,'');
      setTimeout(()=>{setRow(tid,'Calling <strong>'+esc(intent.target)+'</strong>.<br><span class="tag">Dialing</span>');setTimeout(()=>{location.href='tel:'+d;},900);},400);
      break;}
    case 'sms':{
      const d=intent.target.replace(/\D/g,'');
      setTimeout(()=>{setRow(tid,'Opening message to <strong>'+esc(intent.target)+'</strong>.<br><span class="tag">Messages</span>');setTimeout(()=>{location.href='sms:'+d;},900);},400);
      break;}
    case 'email':{
      setTimeout(()=>{setRow(tid,'Opening email to <strong>'+esc(intent.target)+'</strong>.<br><span class="tag">Email</span>');setTimeout(()=>{location.href='mailto:'+intent.target;},900);},400);
      break;}
    case 'timer':
      setTimer(intent.duration, tid);
      break;
    case 'alarm':
      setAlarm(intent.time, tid);
      break;
    case 'location':
      setRow(tid,'Getting your location...');
      getLocationAndRespond(tid);
      break;
    case 'navigate':
      setTimeout(()=>navigateTo(intent.dest, tid),400);
      break;
    case 'nearby':
      setTimeout(()=>searchNearby(intent.query, tid),400);
      break;
    case 'camera':
      setRow(tid,'Opening camera...<span class="tag green">Camera</span>');
      setTimeout(openCamera,400);
      break;
    case 'share':
      doShare(tid);
      break;
    case 'copy':
      doCopy(intent.text, tid);
      break;
    case 'vibrate':
      doVibrate(tid);
      break;
    case 'battery':
      await getBattery(tid);
      break;
    case 'torch':
      await doTorch(tid);
      break;
    case 'fullscreen':
      doFullscreen(tid);
      break;
    case 'app_open':{
      const app=findApp(intent.app);
      if(app){setTimeout(()=>{setRow(tid,'Opening <strong>'+esc(intent.app)+'</strong>.<br><span class="tag">Opened</span>');setTimeout(()=>window.open(app.o,'_blank'),900);},400);}
      else{await handleAI(raw,'Nexus',tid);}
      break;}
    case 'app_search':{
      const app=findApp(intent.app);
      if(app&&app.s){setTimeout(()=>{setRow(tid,'Searching <strong>'+esc(intent.app)+'</strong> for "'+esc(intent.query)+'".<br><span class="tag">'+esc(intent.app)+'</span>');setTimeout(()=>window.open(app.s(intent.query),'_blank'),900);},400);}
      else if(app){setTimeout(()=>{setRow(tid,'Opening <strong>'+esc(intent.app)+'</strong>.<br><span class="tag">Opened</span>');setTimeout(()=>window.open(app.o,'_blank'),900);},400);}
      else{await handleAI(raw,'Nexus',tid);}
      break;}
    default:
      await handleAI(intent.question,'Nexus',tid);
  }
}

textInput.addEventListener('input',()=>{sendBtn.disabled=!textInput.value.trim();});
function handleSend(){const v=textInput.value.trim();if(!v)return;respond(v);textInput.value='';sendBtn.disabled=true;}

// ── VOICE ─────────────────────────────────────────────────────────────────────
let recognition=null,listening=false;
function initVoice(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  const vdot=document.getElementById('vdot');
  const vlabel=document.getElementById('voiceLabel');
  if(!SR){vlabel.textContent='voice unavailable';return;}
  recognition=new SR();
  recognition.lang='en-US';recognition.interimResults=true;recognition.continuous=false;
  recognition.onstart=()=>{listening=true;document.getElementById('micBtn').classList.add('listening');document.getElementById('micIcon').setAttribute('fill','#fff');vdot.classList.remove('off');vlabel.textContent='listening\u2026';};
  recognition.onresult=(e)=>{let t='';for(let i=e.resultIndex;i<e.results.length;i++)t+=e.results[i][0].transcript;textInput.value=t;sendBtn.disabled=!t.trim();if(e.results[e.results.length-1].isFinal){respond(t.trim());textInput.value='';sendBtn.disabled=true;}};
  recognition.onerror=()=>{vlabel.textContent="didn't catch that";};
  recognition.onend=()=>{listening=false;document.getElementById('micBtn').classList.remove('listening');document.getElementById('micIcon').setAttribute('fill','#928C7F');vdot.classList.add('off');vlabel.textContent='voice ready';};
  vlabel.textContent='voice ready';
}
function toggleMic(){if(!recognition)return;if(listening)recognition.stop();else{try{recognition.start();}catch(e){}}}

// ── PWA INSTALL (Android/Chrome) ─────────────────────────────────────────────
// Registers sw.js if it's hosted alongside this file. Harmless no-op (silent
// catch) if it's missing — e.g. opened directly as a local file or artifact.
if('serviceWorker' in navigator && (location.protocol==='https:'||location.hostname==='localhost')){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
